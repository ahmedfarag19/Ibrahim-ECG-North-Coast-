<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECG North Coast Portal | Live Connection</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style type="text/css">
        :root {
            --color-ecg-charcoal: #1A1C1E;
            --color-ecg-accent: #003B71;
            --color-ecg-surface: #F8F9FA;
        }
        body {
            background-color: var(--color-ecg-surface);
            color: var(--color-ecg-charcoal);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
        }
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        .architectural-grid {
            background-image: 
                linear-gradient(to right, rgba(0,0,0,0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0,0,0,0.02) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .sidebar-active { border-left: 4px solid var(--color-ecg-accent); background: rgba(255,255,255,0.05); color: white; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // رابط البيانات الخاص بك
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRosDkYxypFRtPoPmhHI2jhapyh_c05gxjsYSBVe5W6LCDmA5onQRyF1QoeLxZ6R3yBfUawWsbcEBN9/pub?output=csv";

        const Icon = ({ name, size = 18, className = "" }) => {
            const iconRef = React.useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    window.lucide.createIcons({
                        icons: { [name]: window.lucide[name] },
                        attrs: { "stroke-width": 2, "width": size, "height": size }
                    });
                    const iconSvg = window.lucide.createIcons({ nameAttr: 'data-lucide' });
                }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        function App() {
            const [isSidebarOpen, setSidebarOpen] = useState(true);
            const [loading, setLoading] = useState(true);
            const [projects, setProjects] = useState([
                { id: '1', name: 'New Alamein Towers', location: 'New Alamein', budget: 73.5, completionRate: 79.8, pmoLead: 'M. Ahmed', status: 'Healthy' },
                { id: '2', name: 'Latin District', location: 'New Alamein', budget: 40, completionRate: 0, pmoLead: 'Loading...', status: 'Live' },
                { id: '3', name: 'The Heritage City', location: 'Old City', budget: 11.4, completionRate: 78, pmoLead: 'N. Youssef', status: 'Healthy' },
                { id: '4', name: 'AASTMT Campus', location: 'New Alamein', budget: 4, completionRate: 97, pmoLead: 'R. Mostafa', status: 'Healthy' }
            ]);

            useEffect(() => {
                fetch(SHEET_URL)
                    .then(res => res.text())
                    .then(csv => {
                        const rows = csv.split('\r\n');
                        const headers = rows[0].split(',');
                        const values = rows[1].split(',');
                        const data = {};
                        headers.forEach((h, i) => data[h.trim()] = values[i]?.trim());

                        setProjects(prev => prev.map(p => 
                            p.id === '2' ? { 
                                ...p, 
                                completionRate: parseFloat(data.completionRate) || 0,
                                pmoLead: data.pmoLead || 'S. Hassan',
                                details: data.siteNotes
                            } : p
                        ));
                        setLoading(false);
                    })
                    .catch(() => setLoading(false));
            }, []);

            if (loading) return (
                <div className="h-screen flex items-center justify-center bg-[#1A1C1E] text-white">
                    <div className="text-center animate-pulse">
                        <h2 className="text-2xl font-display font-bold tracking-[0.3em]">ECG PORTAL</h2>
                        <p className="text-[10px] uppercase mt-2 text-slate-500">Connecting to Google Sheets...</p>
                    </div>
                </div>
            );

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <aside className={`bg-[#1A1C1E] text-white transition-all duration-300 flex flex-col ${isSidebarOpen ? 'w-64' : 'w-20'}`}>
                        <div className="p-6 mb-8">
                            <h1 className="text-xl font-bold tracking-tighter uppercase">{isSidebarOpen ? 'ECG | PMO' : 'ECG'}</h1>
                        </div>
                        
                        <nav className="flex-1 space-y-1 px-3">
                            <div className="flex items-center gap-4 p-4 sidebar-active rounded-xl cursor-pointer">
                                <Icon name="LayoutDashboard" />
                                {isSidebarOpen && <span className="text-[10px] font-bold uppercase tracking-widest">Dashboard</span>}
                            </div>
                        </nav>

                        <div className="p-4 border-t border-white/5">
                            <button onClick={() => setSidebarOpen(!isSidebarOpen)} className="w-full flex justify-center p-3 hover:bg-white/5 rounded-xl transition-colors">
                                <Icon name={isSidebarOpen ? 'ChevronLeft' : 'Menu'} />
                            </button>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col architectural-grid overflow-y-auto">
                        <header className="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 px-10 flex items-center justify-between sticky top-0 z-50">
                            <div className="flex flex-col">
                                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em]">Operational Portfolio</span>
                                <h2 className="text-lg font-display font-bold text-slate-800">North Coast Projects</h2>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="w-10 h-10 bg-[#003B71] rounded-xl flex items-center justify-center text-white font-bold shadow-lg shadow-[#003B71]/20">AF</div>
                            </div>
                        </header>

                        <div className="p-10 max-w-7xl mx-auto w-full space-y-10">
                            {/* Summary Cards */}
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div className="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm group hover:border-[#003B71]/20 transition-all">
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Portfolio Progress</p>
                                    <div className="flex items-end gap-2">
                                        <h3 className="text-4xl font-display font-bold text-[#1A1C1E]">82.4</h3>
                                        <span className="text-xl font-bold text-[#003B71] mb-1">%</span>
                                    </div>
                                </div>
                                <div className="bg-[#003B71] p-8 rounded-3xl shadow-xl shadow-[#003B71]/20 text-white">
                                    <p className="text-white/50 text-[10px] font-bold uppercase tracking-widest mb-2">Active Budget</p>
                                    <h3 className="text-4xl font-display font-bold">128.9<span className="text-lg ml-2 opacity-50">B</span></h3>
                                </div>
                                <div className="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm">
                                    <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-2">Live Nodes</p>
                                    <div className="flex items-center gap-3">
                                        <h3 className="text-4xl font-display font-bold text-[#1A1C1E]">04</h3>
                                        <div className="px-2 py-1 bg-emerald-50 text-emerald-600 text-[8px] font-bold rounded-md">CONNECTED</div>
                                    </div>
                                </div>
                            </div>

                            {/* Projects Grid */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mt-10">
                                {projects.map((p) => (
                                    <div key={p.id} className="bg-white rounded-[2rem] p-8 border border-slate-100 shadow-sm hover:shadow-2xl hover:shadow-[#003B71]/5 transition-all group relative overflow-hidden">
                                        {p.status === 'Live' && (
                                            <div className="absolute top-0 right-0 bg-emerald-500 text-white px-6 py-1 text-[9px] font-bold uppercase tracking-tighter rotate-0">Live Data</div>
                                        )}
                                        
                                        <div className="flex justify-between items-start mb-6">
                                            <div>
                                                <h4 className="text-2xl font-display font-bold text-slate-800 mb-1">{p.name}</h4>
                                                <div className="flex items-center gap-2 text-slate-400">
                                                    <Icon name="MapPin" size={12} />
                                                    <span className="text-[10px] font-bold uppercase tracking-tighter">{p.location}</span>
                                                </div>
                                            </div>
                                            <div className="p-3 bg-slate-50 rounded-2xl group-hover:bg-[#003B71]/5 transition-colors">
                                                <Icon name="Building2" className="text-slate-400 group-hover:text-[#003B71]" />
                                            </div>
                                        </div>

                                        <div className="space-y-6">
                                            <div className="space-y-2">
                                                <div className="flex justify-between text-[10px] font-bold uppercase tracking-widest">
                                                    <span className="text-slate-300">Execution Progress</span>
                                                    <span className="text-[#003B71]">{p.completionRate}%</span>
                                                </div>
                                                <div className="h-2 w-full bg-slate-100 rounded-full overflow-hidden">
                                                    <div 
                                                        className="h-full bg-[#003B71] transition-all duration-1000 ease-out" 
                                                        style={{ width: `${p.completionRate}%` }}
                                                    />
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-2 gap-4 pt-4 border-t border-slate-50">
                                                <div>
                                                    <p className="text-[9px] font-bold text-slate-300 uppercase mb-1">PMO Lead</p>
                                                    <p className="text-sm font-bold text-slate-700 uppercase tracking-tighter">{p.pmoLead}</p>
                                                </div>
                                                <div className="text-right">
                                                    <p className="text-[9px] font-bold text-slate-300 uppercase mb-1">Capital Value</p>
                                                    <p className="text-sm font-display font-bold text-slate-700">{p.budget}B EGP</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

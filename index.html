<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECG North Coast Construction Portal | Live</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style type="text/css">
        :root {
            --color-ecg-charcoal: #1A1C1E;
            --color-ecg-slate: #64748B;
            --color-ecg-accent: #003B71;
            --color-ecg-surface: #F8F9FA;
        }

        body {
            background-color: var(--color-ecg-surface);
            color: var(--color-ecg-charcoal);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        .font-display { font-family: 'Space Grotesk', sans-serif; }

        .architectural-grid {
            background-image: 
                linear-gradient(to right, rgba(0,0,0,0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0,0,0,0.02) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // رابط جوجل شيت الخاص بك
        const LATIN_DISTRICT_SHEET = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRosDkYxypFRtPoPmhHI2jhapyh_c05gxjsYSBVe5W6LCDmA5onQRyF1QoeLxZ6R3yBfUawWsbcEBN9/pub?output=csv";

        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = '';
                    const iconElement = document.createElement('i');
                    iconElement.setAttribute('data-lucide', name);
                    iconElement.style.width = `${size}px`;
                    iconElement.style.height = `${size}px`;
                    iconRef.current.appendChild(iconElement);
                    window.lucide.createIcons({
                        attrs: { 'stroke-width': 2, 'width': size, 'height': size },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, size]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`} />;
        };

        const PerformanceChart = ({ data }) => {
            const canvasRef = useRef(null);
            const chartRef = useRef(null);

            useEffect(() => {
                if (canvasRef.current) {
                    const ctx = canvasRef.current.getContext('2d');
                    if (chartRef.current) chartRef.current.destroy();
                    chartRef.current = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: data.map(d => d.month),
                            datasets: [{
                                label: 'Progress %',
                                data: data.map(d => d.progress),
                                borderColor: '#3B82F6',
                                backgroundColor: 'rgba(59, 130, 246, 0.1)',
                                fill: true,
                                tension: 0.4,
                                borderWidth: 3
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                    });
                }
            }, [data]);
            return <canvas ref={canvasRef} />;
        };

        const Badge = ({ children, variant = 'default' }) => {
            const styles = {
                default: 'bg-slate-100 text-slate-600',
                success: 'bg-emerald-100 text-emerald-700',
                warning: 'bg-amber-100 text-amber-700'
            };
            return <span className={`px-2 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider ${styles[variant]}`}>{children}</span>;
        };

        function App() {
            const [projects, setProjects] = useState([
                { id: '1', name: 'New Alamein Towers', category: 'High-Rise Towers', location: 'New Alamein', budget: 73.5, completionRate: 79.8, remainingWorks: 27.5, pmoLead: 'M. Ahmed', status: 'Healthy' },
                { id: '2', name: 'Latin District – New Alamein', category: 'Urban Residential', location: 'New Alamein', budget: 40, completionRate: 0, remainingWorks: 0, pmoLead: 'Loading...', status: 'Healthy' },
                { id: '3', name: 'The Heritage City', category: 'Heritage Urban', location: 'Old City', budget: 11.4, completionRate: 78, remainingWorks: 5.1, pmoLead: 'N. Youssef', status: 'Healthy' },
                { id: '4', name: 'AASTMT Alamein Campus', category: 'Educational', location: 'New Alamein', budget: 4, completionRate: 97, remainingWorks: 0.15, pmoLead: 'R. Mostafa', status: 'Healthy' }
            ]);

            const [activeTab, setActiveTab] = useState('overview');
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);

            useEffect(() => {
                // سحب البيانات الحية للحي اللاتيني
                fetch(LATIN_DISTRICT_SHEET)
                    .then(res => res.text())
                    .then(csv => {
                        const rows = csv.split('\r\n');
                        const headers = rows[0].split(',');
                        const values = rows[1].split(',');
                        const liveData = {};
                        headers.forEach((h, i) => liveData[h.trim()] = values[i]?.trim());

                        setProjects(prev => prev.map(p => 
                            p.id === '2' ? { 
                                ...p, 
                                completionRate: parseFloat(liveData.completionRate),
                                remainingWorks: parseFloat(liveData.remainingWorks),
                                pmoLead: liveData.pmoLead 
                            } : p
                        ));
                    });
            }, []);

            const stats = useMemo(() => ({
                totalProjects: projects.length,
                totalBudget: projects.reduce((acc, p) => acc + p.budget, 0).toFixed(1),
                avgProgress: (projects.reduce((acc, p) => acc + (p.completionRate || 0), 0) / projects.length).toFixed(1)
            }), [projects]);

            return (
                <div className="flex bg-[#F8F9FA] h-screen overflow-hidden">
                    {/* Sidebar */}
                    <aside className={`bg-[#1A1C1E] text-white flex flex-col transition-all duration-300 ${isSidebarOpen ? 'w-64' : 'w-20'}`}>
                        <div className="p-8">
                            <span className="text-xl font-bold tracking-tighter">ECG <span className="text-slate-500 font-light">| PMO</span></span>
                        </div>
                        <nav className="flex-1 px-4 space-y-2">
                            <button onClick={() => setActiveTab('overview')} className={`w-full flex items-center gap-4 px-4 py-3 border-l-4 ${activeTab === 'overview' ? 'border-[#003B71] bg-white/10' : 'border-transparent text-slate-500'}`}>
                                <Icon name="layout-dashboard" />
                                {isSidebarOpen && <span className="text-[10px] font-bold uppercase">Dashboard</span>}
                            </button>
                        </nav>
                        <div className="p-4">
                             <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="w-full p-3 bg-white/5 rounded-xl"><Icon name={isSidebarOpen ? 'x' : 'menu'} /></button>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col overflow-y-auto architectural-grid">
                        <header className="h-16 bg-white border-b border-slate-200 px-8 flex items-center justify-between sticky top-0 z-50">
                            <h2 className="font-display font-bold text-slate-800 uppercase tracking-widest text-sm">North Coast Live Portfolio</h2>
                            <div className="flex items-center gap-4">
                                <div className="text-right">
                                    <p className="text-xs font-bold">A. Farag</p>
                                    <p className="text-[9px] text-slate-400 font-bold uppercase">PMO Director</p>
                                </div>
                                <div className="w-10 h-10 bg-black rounded-lg flex items-center justify-center text-white font-bold">AF</div>
                            </div>
                        </header>

                        <div className="p-8 max-w-7xl mx-auto w-full space-y-8 fade-in">
                            {/* Top Stats */}
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Total Budget (EGP)</p>
                                    <h3 className="text-3xl font-mono font-bold text-[#003B71] mt-1">{stats.totalBudget}B</h3>
                                </div>
                                <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Live Avg Progress</p>
                                    <h3 className="text-3xl font-mono font-bold text-emerald-600 mt-1">{stats.avgProgress}%</h3>
                                </div>
                                <div className="bg-[#1A1C1E] p-6 rounded-2xl shadow-xl">
                                    <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Active Sites</p>
                                    <h3 className="text-3xl font-mono font-bold text-white mt-1">{stats.totalProjects}</h3>
                                </div>
                            </div>

                            {/* Projects Grid */}
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                {projects.map((project) => (
                                    <div key={project.id} className="bg-white p-6 rounded-2xl border border-slate-100 hover:shadow-xl transition-all group">
                                        <div className="flex justify-between mb-4">
                                            <Badge variant={project.id === '2' ? 'success' : 'default'}>{project.id === '2' ? 'Live Link' : project.status}</Badge>
                                            {project.id === '2' && <div className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>}
                                        </div>
                                        <h4 className="text-lg font-display font-bold text-slate-800 leading-tight group-hover:text-[#003B71]">{project.name}</h4>
                                        <p className="text-[10px] text-slate-400 font-bold uppercase mt-1">{project.location}</p>
                                        
                                        <div className="mt-8 space-y-2">
                                            <div className="flex justify-between text-[10px] font-bold">
                                                <span className="text-slate-300 uppercase">Progress</span>
                                                <span className="text-slate-800">{project.completionRate}%</span>
                                            </div>
                                            <div className="h-1.5 w-full bg-slate-50 rounded-full overflow-hidden">
                                                <div className="h-full bg-[#003B71] transition-all duration-1000" style={{ width: `${project.completionRate}%` }} />
                                            </div>
                                        </div>

                                        <div className="mt-6 pt-6 border-t border-slate-50 flex justify-between">
                                            <div>
                                                <p className="text-[9px] font-bold text-slate-300 uppercase">PMO Lead</p>
                                                <p className="text-xs font-bold text-slate-600">{project.pmoLead}</p>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-[9px] font-bold text-slate-300 uppercase">Remain</p>
                                                <p className="text-xs font-mono font-bold text-slate-600">{project.remainingWorks}B</p>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
